# Get editor completions based on the config schema
"$schema" = "https://starship.rs/config-schema.json"

# Inserts a blank line between shell prompts
add_newline = false

# Use custom format
format = """
$hostname\
$directory\
$fossil_branch\
$fossil_metrics\
$git_branch\
${custom.git_context}\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$python\
$rust\
$golang\
$nodejs\
$meson\
$cmake\
$jobs\
$cmd_duration\
$fill\
${custom.proxy}\
${custom.direnv}\
${custom.ai}\
$time\
$line_break\
$character\
"""

###############
### modules ###
###############

[fill]
symbol = " "
style = "bold blue"

[character]
