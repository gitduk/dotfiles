[custom.direnv]
command = """
allowed=$(direnv status --json 2>/dev/null | jq -r '.state.foundRC.allowed // empty')
case "$allowed" in
  0) echo "\e[1;34m¾░Ö┤\e[0m" ;;
  2) echo "\e[90m¾░Ö┤\e[0m" ;;
  *) echo "" ;;
esac
"""
when = "direnv status 2>/dev/null"
shell = ["sh"]
symbol = ""
style = ""
format = "[$symbol$output]($style) "

[custom.proxy]
command = ""
when = "test $http_proxy"
shell = ["sh"]
symbol = "¾▒ÉĪ"
style = "bold blue"
format = "[$symbol$output]($style) "

[custom.ai]
command = '''
_ai() { i="¾▒Ģģ"; [ -n "$2" ] && i="¾▒Øü"; printf "$1${i}\e[0m"; }
s=""
[ -n "$ANTHROPIC_BASE_URL" ] && s="$(_ai "\e[93m" "$ANTHROPIC_API_KEY")"
[ -n "$OPENAI_BASE_URL" ]    && s="${s:+$s }$(_ai "\e[32m" "$OPENAI_API_KEY")"
[ -n "$GEMINI_BASE_URL" ]    && s="${s:+$s }$(_ai "\e[34m" "$GEMINI_API_KEY")"
printf "$s"
'''
when = '[ -n "$ANTHROPIC_BASE_URL$OPENAI_BASE_URL$GEMINI_BASE_URL" ]'
shell = ["sh"]
style = ""
format = "$output "

[custom.git_context]
command = """
git worktree list 2>/dev/null | awk '{printf $2}'
"""
when = "ls .git"
shell = ["sh"]
symbol = ""
style = "bold blue dimmed"
format = "[$symbol$output]($style) "

