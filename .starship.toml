[custom.direnv]
command = """
allowed=$(direnv status --json 2>/dev/null | jq -r '.state.foundRC.allowed // empty')
[ -e .env ] && file=".env"
[ -e .envrc ] && file=".envrc"
case "$allowed" in
  0) echo "\e[1;34m$file\e[0m" ;;
  2) echo "\e[90m$file\e[0m" ;;
  *) echo "" ;;
esac
"""
when = "direnv status 2>/dev/null"
shell = ["sh"]
symbol = ""
style = ""
format = "[$symbol$output]($style) "

[custom.proxy]
command = ""
when = "test $http_proxy"
shell = ["sh"]
symbol = "уұҗЎ"
style = "bold blue"
format = "[$symbol$output]($style) "

[custom.ai]
command = '''
_ai() { i="уұ•…"; [ -n "$2" ] && i="уұқҒ"; printf "$1${i}\e[0m"; }
s=""
[ -n "$ANTHROPIC_API_KEY" ] && s="$(_ai "\e[93m" "$ANTHROPIC_BASE_URL")"
[ -n "$OPENAI_API_KEY" ]    && s="${s:+$s }$(_ai "\e[32m" "$OPENAI_BASE_URL")"
[ -n "$GEMINI_API_KEY" ]    && s="${s:+$s }$(_ai "\e[34m" "$GEMINI_BASE_URL")"
printf "$s"
'''
when = '[ -n "$ANTHROPIC_API_KEY$OPENAI_API_KEY$GEMINI_API_KEY" ]'
shell = ["sh"]
style = ""
format = "$output "

[custom.git_context]
command = """
git worktree list 2>/dev/null | awk '{printf $2}'
"""
when = "ls .git"
shell = ["sh"]
symbol = ""
style = "bold blue dimmed"
format = "[$symbol$output]($style) "

