# Get editor completions based on the config schema
"$schema" = "https://starship.rs/config-schema.json"

# Inserts a blank line between shell prompts
add_newline = false

# Use custom format
format = """
$hostname\
$directory\
$fossil_branch\
$fossil_metrics\
$git_branch\
${custom.git_context}\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$python\
$rust\
$golang\
$nodejs\
$meson\
$cmake\
$jobs\
$cmd_duration\
$fill\
${custom.proxy}\
${custom.direnv}\
${custom.ai}\
$time\
$line_break\
$character\
"""

###############
### modules ###
###############

[fill]
symbol = " "
style = "bold blue"

[character]
success_symbol = "[вһң](green)"
error_symbol = "[вһң](red)"
vimcmd_symbol = "[оҚ„](green)"

[directory]
truncation_length = 3
truncation_symbol = "вҖҰ/"
read_only = " ro"
style = "bold blue"

# [directory.substitutions]
# "Documents" = "у°Ҳҷ "
# "Downloads" = "пҖҷ "
# "Music" = "пҖҒ "
# "Pictures" = "пҖҫ "

[direnv]
disabled = true
detect_files = [".env", ".envrc"]
symbol = "direnv "
style = "bold green"
format = "[$symbol]($style) "

[git_commit]
tag_symbol = " tag "

[git_status]
ahead = ">"
behind = "<"
diverged = "<>"
renamed = "r"
deleted = "x"

[hostname]
ssh_only = true
ssh_symbol = "оҜҠ "

[time]
disabled = false
time_format = "%H:%M"
style = "fg:#5c6370"
format = "[$time]($style)"

[os]
disabled = false
style = "bold white"
format = "[$symbol ]($style)"

